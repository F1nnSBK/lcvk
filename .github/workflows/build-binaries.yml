name: Build and Release Native Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: pithos.so
            output_name: libpithos-linux-x86_64.so
          - os: macos-latest
            artifact_name: pithos.dylib
            output_name: libpithos-macos-aarch64.dylib

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile Native Shared Library
        run: mvn clean package -DskipTests

      - name: Prepare Artifact
        run: |
          mkdir -p build-binaries
          cp target/${{ matrix.artifact_name }} build-binaries/${{ matrix.output_name }}
          # Copy FFI C headers
          cp target/pithos.h build-binaries/
          cp target/graal_isolate.h build-binaries/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pithos-binaries-${{ matrix.os }}
          path: build-binaries/

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries

      - name: Flatten folder structure for release
        run: |
          mkdir -p release-assets
          find all-binaries -type f -exec cp {} release-assets/ \;
          ls -l release-assets/

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Automated Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
